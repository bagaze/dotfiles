# tmux configuration

# Change prefix binding from 'C-b' to 'C-s'
unbind-key C-b
set-option -g prefix C-s
bind-key C-s send-prefix
bind-key / copy-mode \; send-key /

# Handle mouse
set -g mouse on

# Start numbering panes at 1
set -g base-index 1

# Default config for colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Cursor fix
# set -as terminal-overrides '*:Se=\033[5 q'

# Plugin declation
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'fabioluciano/tmux-powerkit'

# PowerKit configuration
set -g @powerkit_plugins "datetime,weather,battery,memory,git,hostname"
set -g @powerkit_theme "tokyo-night"
set -g @powerkit_theme_variant "storm"

# Powerkit plutin settings
## weather
set -g @powerkit_plugin_weather_location "Paris, FR"

# Run TPM
run '~/.config/tmux/plugins/tpm/tpm'
